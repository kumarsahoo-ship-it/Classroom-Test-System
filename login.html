<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>

    <p>Don't have account? <a href="signup.html">Signup</a></p>
</div>

<script>

function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Enter username & password");
        return;
    }

    fetch("https://classroom-test-system.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    })
    .then(res => res.text())
    .then(data => {

        if (data === "Login success" || data === "Login successful") {

            // 🔥 SAVE USER
            localStorage.setItem("user", username);

            alert("Login Successful ✅");

            window.location.href = "dashboard.html";

        } else {
            alert("Invalid credentials ❌");
        }
    })
    .catch(err => {
        console.log(err);
        alert("Server error");
    });
}

</script>

</body>
</html>
