<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Protect Page -->
<script>
    const user = localStorage.getItem("user");

    if (!user) {
        window.location.href = "login.html";
    }
</script>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Quiz System</h2>

        <ul>
            <li onclick="go('dashboard')" class="active">Dashboard</li>
            <li onclick="go('create-test')">Create Test</li>
            <li onclick="go('view-test')">View Test</li>
            <li onclick="go('results')">Results</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>Welcome 👋 <span id="user"></span></h1>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Tests</h3>
                <p>10</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>6</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>4</p>
            </div>
        </div>

        <!-- Table -->
        <h2>Recent Activity</h2>

        <table>
            <tr>
                <th>Test</th>
                <th>Status</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>Math Test</td>
                <td>Completed</td>
                <td>8/10</td>
            </tr>
            <tr>
                <td>Science Test</td>
                <td>Pending</td>
                <td>-</td>
            </tr>
        </table>

    </div>
</div>

<!-- JS -->
<script>
    // show username
    document.getElementById("user").innerText = localStorage.getItem("user");

    // navigation
    function go(page) {
        window.location.href = page + ".html";
    }

    // logout
    function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }
</script>
    <script src="script.js"></script>

</body>
</html>
