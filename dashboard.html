<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="sidebar">
        <h2 class="logo">Test System</h2>
        <ul>
            <li class="active">DashBoard</li>
            <li>Create Test</li>
            <li>view Test</li>
            <li>Result</li>
            <li>Settings</li>
            <li>Logout</li>
            
        </ul>
    </div>
    <div class="main">

        <div class="topbar">
            <h1>DashBoard</h1>
            <div class="user">
                <span>welcome, user</span>
            </div>
        </div>
        <div class="cards">
            <div class="card">
                <h3>Total Tests</h3>
                <p>10</p>
            </div>
            <div class="card">
                <h3>Completed</h3>
                <p>10</p>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <p class="pend">10</p>
            </div>
        </div>
        <div class="tableselection">
            <h2>Recent Tests</h2>
            <table>
                <tr>
                    <th>Test Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Math Test</td>
                    <td>05 April</td>
                    <td class="completed"></td>
                </tr>
                <tr>
                    <td>Cs quiz</td>
                    <td>05 April</td>
                    <td class="pending"></td>
                </tr>
                <tr>
                    <td>HS Test</td>
                    <td>05 April</td>
                    <td class="completed"></td>
                </tr>
            </table>
        </div>


    </div>

</body>
</html>
