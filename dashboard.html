<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Quiz System</h2>
        <ul>
            <li class="active">Dashboard</li>
            <li>Create Test</li>
            <li>View Test</li>
            <li>Results</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h1>Welcome 👋</h1>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Tests</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>8</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>4</p>
            </div>
        </div>

        <!-- Table -->
        <h2>Recent Tests</h2>

        <table>
            <tr>
                <th>Test Name</th>
                <th>Status</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>Math Quiz</td>
                <td>Completed</td>
                <td>8/10</td>
            </tr>
            <tr>
                <td>Science Quiz</td>
                <td>Pending</td>
                <td>-</td>
            </tr>
        </table>

    </div>

</div>

<script>
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
