<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Questions</title>
    <link rel="stylesheet" href="question.css">
</head>
<body>

<div class="container">
    <h2>Create Test Question</h2>

    <form>
        <!-- Question Title -->
        <label>Question</label>
        <textarea placeholder="Enter your question..." required></textarea>

        <!-- Options -->
        <label>Option A</label>
        <input type="text" placeholder="Enter option A" required>

        <label>Option B</label>
        <input type="text" placeholder="Enter option B" required>

        <label>Option C</label>
        <input type="text" placeholder="Enter option C" required>

        <label>Option D</label>
        <input type="text" placeholder="Enter option D" required>

        <!-- Correct Answer -->
        <label>Correct Answer</label>
        <select required>
            <option value="">Select correct answer</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
        </select>

        

        <!-- Marks -->
        <label>Marks</label>
        <input type="number" placeholder="Enter marks" required>

        <!-- Timer -->
        <label>Time Limit (seconds)</label>
        <input type="number" placeholder="Enter time" required>

        <!-- Submit -->
        <button type="submit">Add Question</button>
    </form>
</div>

</body>
</html>
