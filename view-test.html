<!DOCTYPE html>
<html>
<head>
    <title>Available Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Available Tests</h2>

<div id="tests"></div>

<script>
fetch("https://classroom-test-system.onrender.com/tests")
.then(res => res.json())
.then(data => {
    data.forEach(test => {
        document.getElementById("tests").innerHTML += `
            <div class="card">
                <h3>${test}</h3>
                <button onclick="startTest('${test}')">Start Test</button>
            </div>
        `;
    });
});

function startTest(name) {
    localStorage.setItem("testName", name);
    window.location.href = "quiz.html"; // redirect
}
</script>

</body>
</html>
