<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
</head>
<body>

<h2>Create / Edit Test</h2>

<input id="testName" placeholder="Test Name"><br><br>

<h3>Timer</h3>
<input id="hour" placeholder="HH"> :
<input id="minute" placeholder="MM"> :
<input id="second" placeholder="SS">

<div id="questions"></div>

<br>
<button onclick="addQuestion()">Add Question</button>
<button onclick="submitTest()">Save Test</button>

<script>

let count = 0;

function addQuestion(qData=null){
    count++;

    const div = document.createElement("div");

    div.innerHTML = `
        <h3>Q${count}</h3>
        <input id="q${count}" placeholder="Question"><br>
        <input id="q${count}o1" placeholder="Option 1"><br>
        <input id="q${count}o2" placeholder="Option 2"><br>
        <input id="q${count}o3" placeholder="Option 3"><br>
        <input id="q${count}o4" placeholder="Option 4"><br>

        <input type="radio" name="ans${count}" value="1">1
        <input type="radio" name="ans${count}" value="2">2
        <input type="radio" name="ans${count}" value="3">3
        <input type="radio" name="ans${count}" value="4">4
        <hr>
    `;

    document.getElementById("questions").appendChild(div);

    if(qData){
        document.getElementById(`q${count}`).value = qData.question;

        qData.options.forEach((opt,i)=>{
            document.getElementById(`q${count}o${i+1}`).value = opt;

            if(opt === qData.answer){
                document.querySelector(
                  `input[name="ans${count}"][value="${i+1}"]`
                ).checked = true;
            }
        });
    }
}

// ================= SUBMIT =================
function submitTest(){

    const testName = testNameInput.value.trim();

    const totalTime =
        (parseInt(hour.value)||0)*3600 +
        (parseInt(minute.value)||0)*60 +
        (parseInt(second.value)||0);

    if(!testName || totalTime<=0){
        alert("Enter name & timer");
        return;
    }

    let questions=[];

    for(let i=1;i<=count;i++){

        const q = document.getElementById(`q${i}`).value;

        const opts = [
            q1o1 = document.getElementById(`q${i}o1`).value,
            q1o2 = document.getElementById(`q${i}o2`).value,
            q1o3 = document.getElementById(`q${i}o3`).value,
            q1o4 = document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);

        if(!q || opts.includes("") || !selected){
            alert("Complete all questions");
            return;
        }

        questions.push({
            question:q,
            options:opts,
            answer:opts[selected.value-1]
        });
    }

    fetch("https://classroom-test-system.onrender.com/add-questions",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            testName,
            questions,
            time: totalTime,
            createdBy: localStorage.getItem("user")
        })
    })
    .then(r=>r.json())
    .then(d=>{
        alert(d.message);
        window.location="dashboard.html";
    });
}

// ================= EDIT MODE =================
const params = new URLSearchParams(location.search);
const edit = params.get("test");

if(edit){
    testNameInput.value = edit;

    fetch(`https://classroom-test-system.onrender.com/test/${edit}`)
    .then(r=>r.json())
    .then(data=>{
        if(!data) return;

        let t=data.time;
        hour.value = Math.floor(t/3600);
        minute.value = Math.floor((t%3600)/60);
        second.value = t%60;

        data.questions.forEach(q=>addQuestion(q));
    });
}

</script>

</body>
</html>
