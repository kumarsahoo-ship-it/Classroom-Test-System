<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Create Test</h2>

<input id="testName" placeholder="Test Name"><br><br>

<h3>Set Timer</h3>
<input id="hour" placeholder="HH" type="number" min="0"> :
<input id="minute" placeholder="MM" type="number" min="0"> :
<input id="second" placeholder="SS" type="number" min="0"><br><br>

<div id="questions"></div>

<button type="button" onclick="addQuestion()">Add Question</button>
<button type="button" onclick="submitTest()">Submit</button>

<script>
let count = 0;

function addQuestion() {
    count++;

    const div = document.createElement("div");
    div.innerHTML = `
        <h3>Q${count}</h3>
        <input id="q${count}" placeholder="Question"><br>
        <input id="q${count}o1" placeholder="Option 1">
        <input id="q${count}o2" placeholder="Option 2">
        <input id="q${count}o3" placeholder="Option 3">
        <input id="q${count}o4" placeholder="Option 4"><br>

        <label><input type="radio" name="ans${count}" value="1">1</label>
        <label><input type="radio" name="ans${count}" value="2">2</label>
        <label><input type="radio" name="ans${count}" value="3">3</label>
        <label><input type="radio" name="ans${count}" value="4">4</label>
        <hr>
    `;

    document.getElementById("questions").appendChild(div);
}

function submitTest() {

    const testName = document.getElementById("testName").value;

    const h = +document.getElementById("hour").value || 0;
    const m = +document.getElementById("minute").value || 0;
    const s = +document.getElementById("second").value || 0;

    const totalTime = h*3600 + m*60 + s;

    for (let i=1; i<=count; i++) {

        const question = document.getElementById(`q${i}`).value;

        const options = [
            document.getElementById(`q${i}o1`).value,
            document.getElementById(`q${i}o2`).value,
            document.getElementById(`q${i}o3`).value,
            document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);
        const answer = options[selected.value - 1];

        fetch("https://classroom-test-system.onrender.com/add-question", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                testName,
                question,
                options,
                answer,
                time: totalTime
            })
        });
    }

    alert("Test Created");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
