<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Create Test</h2>

<input id="testName" placeholder="Test Name"><br><br>

<h3>⏱ Timer</h3>
<input id="hour" type="number" placeholder="HH">
<input id="minute" type="number" placeholder="MM">
<input id="second" type="number" placeholder="SS">

<div id="questions"></div>

<br>
<button onclick="addQuestion()">➕ Add Question</button>
<button onclick="previewTest()">👁 Preview</button>
<button onclick="submitTest()">✅ Save</button>

<script>

let count = 0;

// ADD QUESTION
function addQuestion() {
    count++;

    const div = document.createElement("div");
    div.id = "card" + count;

    div.innerHTML = `
        <h3>Q${count}</h3>
        <input id="q${count}" placeholder="Question"><br>

        <input id="q${count}o1" placeholder="Option 1"><br>
        <input id="q${count}o2" placeholder="Option 2"><br>
        <input id="q${count}o3" placeholder="Option 3"><br>
        <input id="q${count}o4" placeholder="Option 4"><br>

        <input type="radio" name="ans${count}" value="1">1
        <input type="radio" name="ans${count}" value="2">2
        <input type="radio" name="ans${count}" value="3">3
        <input type="radio" name="ans${count}" value="4">4

        <br>
        <button onclick="deleteQuestion(${count})">Delete</button>
        <hr>
    `;

    document.getElementById("questions").appendChild(div);
}

// DELETE
function deleteQuestion(id) {
    document.getElementById("card" + id).remove();
}

// PREVIEW
function previewTest() {
    let text = "";

    for (let i = 1; i <= count; i++) {
        const q = document.getElementById(`q${i}`);
        if (!q) continue;

        text += `\n${i}. ${q.value}`;
    }

    alert(text || "No questions");
}

// SUBMIT
function submitTest() {

    const testName = document.getElementById("testName").value.trim();

    const h = parseInt(hour.value) || 0;
    const m = parseInt(minute.value) || 0;
    const s = parseInt(second.value) || 0;

    const totalTime = h * 3600 + m * 60 + s;

    if (!testName || totalTime <= 0) {
        alert("Enter test name and timer");
        return;
    }

    let questions = [];
    let seen = new Set();

    for (let i = 1; i <= count; i++) {

        const qEl = document.getElementById(`q${i}`);
        if (!qEl) continue;

        const question = qEl.value;

        if (seen.has(question)) {
            alert("Duplicate question: " + question);
            return;
        }

        seen.add(question);

        const options = [
            document.getElementById(`q${i}o1`).value,
            document.getElementById(`q${i}o2`).value,
            document.getElementById(`q${i}o3`).value,
            document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);

        if (!question || options.includes("") || !selected) {
            alert("Complete all questions");
            return;
        }

        questions.push({
            question,
            options,
            answer: options[selected.value - 1]
        });
    }

    fetch("https://classroom-test-system.onrender.com/add-questions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            testName,
            questions,
            time: totalTime
        })
    })
    .then(async res => {
        const data = await res.json();

        if (!res.ok) {
            alert(data.message);
            return;
        }

        alert("Saved");
        window.location.href = "dashboard.html";
    });
}

</script>

</body>
</html>
